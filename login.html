<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAS Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-dark);
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background-color: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .login-logo {
            max-width: 180px;
            margin-bottom: 24px;
        }

        .login-title {
            color: var(--text-main);
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(30, 25, 70, 0.5);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(155, 123, 247, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .login-btn:hover {
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
            background-color: #8b68f5;
        }

        .error-msg {
            color: #ef4444;
            margin-top: 16px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <img src="descarga.jpg" alt="SAS Logo" class="login-logo" onerror="this.src=''; this.alt='SAS Academy'">
        <h2 class="login-title">Acceso Restringido</h2>
        <p class="login-subtitle">Introduce la clave de equipo para continuar</p>

        <div class="input-group">
            <label for="pwd">Contraseña de Acceso</label>
            <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password"
                onkeypress="handleEnter(event)">
        </div>

        <button class="login-btn" onclick="checkLogin()">Acceder al Dashboard</button>
        <div id="error-msg" class="error-msg">Contraseña incorrecta. Por favor, inténtalo de nuevo.</div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('sas_auth') === 'true') {
            window.location.href = 'index.html';
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                checkLogin();
            }
        }

        function checkLogin() {
            const pwdInput = document.getElementById('pwd').value;
            const errorMsg = document.getElementById('error-msg');

            // Hardcoded password "Sas2025!" for simplicity right now
            if (pwdInput === 'Sas2025!') {
                localStorage.setItem('sas_auth', 'true');
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
                // shake effect
                const card = document.querySelector('.login-card');
                card.style.transform = 'translateX(-10px)';
                setTimeout(() => card.style.transform = 'translateX(10px)', 100);
                setTimeout(() => card.style.transform = 'translateX(-10px)', 200);
                setTimeout(() => card.style.transform = 'translateX(0)', 300);
            }
        }
    </script>
</body>

</html>
